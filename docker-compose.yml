version: "3.8"

services:
  # Node.js application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_v2_web
    ports:
      - "3000:3000"
    volumes:
      # For development - mount source code
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - SESSION_SECRET=your_secret_key_here
      - DATABASE_PATH=/app/database/library.db
    restart: unless-stopped
    networks:
      - library-network

networks:
  library-network:
    driver: bridge
