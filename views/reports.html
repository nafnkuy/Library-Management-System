<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports - Library Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">📚 Library System</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/books">Books</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/members">Members</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/borrowing">Borrowing</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/reports">Reports</a>
            </li>
            <li class="nav-item">
              <span
                class="navbar-text"
                id="userName"
                style="color: white; margin-right: 20px"
              ></span>
            </li>
            <li class="nav-item">
              <button class="btn btn-light btn-sm" id="logoutBtn">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <h2>📊 Reports</h2>

      <!-- Overdue Books Report -->
      <div class="report-card">
        <h5 class="report-title">Overdue Books</h5>
        <div class="table-container">
          <table class="table table-striped mb-0" id="overdueTable">
            <thead>
              <tr>
                <th>Member</th>
                <th>Book</th>
                <th>Due Date</th>
                <th>Days Overdue</th>
                <th>Fine</th>
              </tr>
            </thead>
            <tbody id="overdueTableBody">
              <tr>
                <td colspan="5" class="text-center text-muted">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Top Borrowed Books -->
      <div class="report-card">
        <h5 class="report-title">Top Borrowed Books</h5>
        <div class="table-container">
          <table class="table table-striped mb-0" id="topBooksTable">
            <thead>
              <tr>
                <th>Book Title</th>
                <th>Author</th>
                <th>Times Borrowed</th>
              </tr>
            </thead>
            <tbody id="topBooksTableBody">
              <tr>
                <td colspan="3" class="text-center text-muted">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Most Active Members -->
      <div class="report-card">
        <h5 class="report-title">Most Active Members</h5>
        <div class="table-container">
          <table class="table table-striped mb-0" id="activeMembersTable">
            <thead>
              <tr>
                <th>Member Name</th>
                <th>Books Borrowed</th>
                <th>Current Books</th>
              </tr>
            </thead>
            <tbody id="activeMembersTableBody">
              <tr>
                <td colspan="3" class="text-center text-muted">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Get current user
      async function loadCurrentUser() {
        try {
          const response = await fetch("/api/auth/me");
          if (response.ok) {
            const user = await response.json();
            document.getElementById("userName").textContent = user.full_name;
          } else {
            window.location.href = "/login";
          }
        } catch (error) {
          window.location.href = "/login";
        }
      }

      // Load overdue books
      async function loadOverdueBooks() {
        try {
          const response = await fetch("/api/borrowing/overdue");
          if (response.ok) {
            const records = await response.json();
            const tbody = document.getElementById("overdueTableBody");
            tbody.innerHTML = "";

            if (records.length === 0) {
              tbody.innerHTML =
                '<tr><td colspan="5" class="text-center text-muted">No overdue books</td></tr>';
              return;
            }

            records.forEach((record) => {
              const dueDate = new Date(record.due_date);
              const today = new Date();
              const daysOverdue = Math.floor(
                (today - dueDate) / (1000 * 60 * 60 * 24),
              );
              const fine = daysOverdue * 10;

              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${record.member_name}</td>
                <td>${record.book_title}</td>
                <td>${dueDate.toLocaleDateString()}</td>
                <td><span class="overdue-badge">${daysOverdue} days</span></td>
                <td>${fine} baht</td>
              `;
              tbody.appendChild(row);
            });
          }
        } catch (error) {
          console.error("Error loading overdue books:", error);
        }
      }

      // Load top borrowed books (placeholder)
      async function loadTopBooks() {
        try {
          const response = await fetch("/api/books");
          if (response.ok) {
            const books = await response.json();
            const tbody = document.getElementById("topBooksTableBody");
            tbody.innerHTML = "";

            if (books.length === 0) {
              tbody.innerHTML =
                '<tr><td colspan="3" class="text-center text-muted">No data available</td></tr>';
              return;
            }

            // Show first 5 books as placeholder
            books.slice(0, 5).forEach((book) => {
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${book.title}</td>
                <td>${book.author}</td>
                <td>-</td>
              `;
              tbody.appendChild(row);
            });
          }
        } catch (error) {
          console.error("Error loading top books:", error);
        }
      }

      // Load active members (placeholder)
      async function loadActiveMembers() {
        try {
          const response = await fetch("/api/members");
          if (response.ok) {
            const members = await response.json();
            const tbody = document.getElementById("activeMembersTableBody");
            tbody.innerHTML = "";

            if (members.length === 0) {
              tbody.innerHTML =
                '<tr><td colspan="3" class="text-center text-muted">No data available</td></tr>';
              return;
            }

            // Show first 5 members as placeholder
            members.slice(0, 5).forEach((member) => {
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${member.full_name}</td>
                <td>-</td>
                <td>-</td>
              `;
              tbody.appendChild(row);
            });
          }
        } catch (error) {
          console.error("Error loading active members:", error);
        }
      }

      // Logout
      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          try {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login";
          } catch (error) {
            console.error("Logout error:", error);
          }
        });

      // Load data on page load
      window.addEventListener("load", () => {
        loadCurrentUser();
        loadOverdueBooks();
        loadTopBooks();
        loadActiveMembers();
      });
    </script>
  </body>
</html>
