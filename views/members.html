<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Members - Library Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">📚 Library System</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/books">Books</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/members">Members</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/borrowing">Borrowing</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/reports">Reports</a>
            </li>
            <li class="nav-item">
              <span
                class="navbar-text"
                id="userName"
                style="color: white; margin-right: 20px"
              ></span>
            </li>
            <li class="nav-item">
              <button class="btn btn-light btn-sm" id="logoutBtn">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row mb-4">
        <div class="col">
          <h2>👥 Members Management</h2>
        </div>
        <div class="col text-end">
          <button class="btn btn-add" id="addMemberBtn">+ Add Member</button>
        </div>
      </div>

      <div class="table-container">
        <table class="table table-striped mb-0" id="membersTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Full Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Status</th>
              <th>Max Books</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="membersTableBody">
            <tr>
              <td colspan="7" class="text-center text-muted">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Add Member Modal -->
    <div
      class="modal fade"
      id="addMemberModal"
      tabindex="-1"
      aria-labelledby="addMemberModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addMemberModalLabel">Add New Member</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="addMemberForm">
              <div class="mb-3">
                <label for="memberCode" class="form-label">Member Code *</label>
                <input
                  type="text"
                  class="form-control"
                  id="memberCode"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="memberName" class="form-label">Full Name *</label>
                <input
                  type="text"
                  class="form-control"
                  id="memberName"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="memberEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="memberEmail" />
              </div>
              <div class="mb-3">
                <label for="memberPhone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="memberPhone" />
              </div>
              <div class="mb-3">
                <label for="memberType" class="form-label">Member Type *</label>
                <select class="form-select" id="memberType" required>
                  <option value="">Select Member Type</option>
                  <option value="student">Student</option>
                  <option value="staff">Staff</option>
                  <option value="faculty">Faculty</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="memberMaxBooks" class="form-label">Max Books</label>
                <input
                  type="number"
                  class="form-control"
                  id="memberMaxBooks"
                  value="3"
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="saveMember()"
            >
              Save Member
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Member Modal -->
    <div
      class="modal fade"
      id="editMemberModal"
      tabindex="-1"
      aria-labelledby="editMemberModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="editMemberModalLabel">Edit Member</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="editMemberForm">
              <input type="hidden" id="editMemberId" />
              <div class="mb-3">
                <label for="editMemberCode" class="form-label"
                  >Member Code *</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="editMemberCode"
                  disabled
                />
              </div>
              <div class="mb-3">
                <label for="editMemberName" class="form-label"
                  >Full Name *</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="editMemberName"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="editMemberEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="editMemberEmail" />
              </div>
              <div class="mb-3">
                <label for="editMemberPhone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="editMemberPhone" />
              </div>
              <div class="mb-3">
                <label for="editMemberType" class="form-label"
                  >Member Type *</label
                >
                <select class="form-select" id="editMemberType" required>
                  <option value="">Select Member Type</option>
                  <option value="student">Student</option>
                  <option value="teacher">Teacher</option>
                  <option value="public">Public</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="editMemberStatus" class="form-label"
                  >Status *</label
                >
                <select class="form-select" id="editMemberStatus" required>
                  <option value="">Select Status</option>
                  <option value="active">Active</option>
                  <option value="inactive">Inactive</option>
                  <option value="suspended">Suspended</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="editMemberMaxBooks" class="form-label"
                  >Max Books</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="editMemberMaxBooks"
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="saveEditMember()"
            >
              Update Member
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Get current user
      async function loadCurrentUser() {
        try {
          const response = await fetch("/api/auth/me");
          if (response.ok) {
            const user = await response.json();
            document.getElementById("userName").textContent = user.full_name;
          } else {
            window.location.href = "/login";
          }
        } catch (error) {
          window.location.href = "/login";
        }
      }

      // Load members
      async function loadMembers() {
        try {
          const response = await fetch("/api/members");
          if (response.ok) {
            const members = await response.json();
            const tbody = document.getElementById("membersTableBody");
            tbody.innerHTML = "";

            if (members.length === 0) {
              tbody.innerHTML =
                '<tr><td colspan="7" class="text-center text-muted">No members found</td></tr>';
              return;
            }

            members.forEach((member) => {
              const statusClass =
                member.status === "active"
                  ? "status-active"
                  : "status-inactive";
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${member.id || member.member_id}</td>
                <td>${member.full_name}</td>
                <td>${member.email || ""}</td>
                <td>${member.phone || ""}</td>
                <td><span class="status-badge ${statusClass}">${member.status}</span></td>
                <td>${member.max_books}</td>
                <td>
                  <button class="btn btn-sm btn-primary" onclick="editMember(${member.id || member.member_id})">Edit</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteMember(${member.id || member.member_id})">Delete</button>
                </td>
              `;
              tbody.appendChild(row);
            });
          }
        } catch (error) {
          console.error("Error loading members:", error);
        }
      }

      // Edit member
      function editMember(id) {
        fetch(`/api/members/${id}`)
          .then((response) => {
            if (response.ok) {
              return response.json();
            } else {
              throw new Error("Member not found");
            }
          })
          .then((member) => {
            // Populate edit form
            document.getElementById("editMemberId").value =
              member.id || member.member_id;
            document.getElementById("editMemberCode").value =
              member.member_code || "";
            document.getElementById("editMemberName").value =
              member.full_name || "";
            document.getElementById("editMemberEmail").value =
              member.email || "";
            document.getElementById("editMemberPhone").value =
              member.phone || "";
            document.getElementById("editMemberType").value =
              member.member_type || "";
            document.getElementById("editMemberStatus").value =
              member.status || "active";
            document.getElementById("editMemberMaxBooks").value =
              member.max_books || 3;

            // Show modal
            const modal = new bootstrap.Modal(
              document.getElementById("editMemberModal"),
            );
            modal.show();
          })
          .catch((error) => {
            console.error("Error loading member:", error);
            alert("Error loading member: " + error.message);
          });
      }

      // Save edited member
      async function saveEditMember() {
        const memberId = document.getElementById("editMemberId").value;
        const fullName = document.getElementById("editMemberName").value.trim();
        const email = document.getElementById("editMemberEmail").value.trim();
        const phone = document.getElementById("editMemberPhone").value.trim();
        const memberType = document
          .getElementById("editMemberType")
          .value.trim();
        const status = document.getElementById("editMemberStatus").value.trim();
        const maxBooks = document
          .getElementById("editMemberMaxBooks")
          .value.trim();

        if (!fullName || !memberType || !status) {
          alert("Full Name, Member Type, and Status are required!");
          return;
        }

        try {
          const response = await fetch(`/api/members/${memberId}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              fullName,
              email: email || null,
              phone: phone || null,
              memberType,
              status,
              maxBooks: maxBooks ? parseInt(maxBooks) : 3,
            }),
          });

          if (response.ok) {
            alert("Member updated successfully!");
            document.getElementById("editMemberForm").reset();
            const modal = document.getElementById("editMemberModal");
            const bootstrapModal = window.bootstrap.Modal.getInstance(modal);
            bootstrapModal.hide();
            loadMembers();
          } else {
            const error = await response.json();
            alert("Error: " + (error.error || "Failed to update member"));
          }
        } catch (error) {
          console.error("Error updating member:", error);
          alert("Error updating member: " + error.message);
        }
      }

      // Delete member
      function deleteMember(id) {
        if (confirm("Are you sure you want to delete this member?")) {
          fetch(`/api/members/${id}`, {
            method: "DELETE",
          })
            .then((response) => {
              if (response.ok) {
                alert("Member deleted successfully!");
                loadMembers();
              } else {
                return response.json().then((err) => {
                  throw new Error(err.error || "Failed to delete member");
                });
              }
            })
            .catch((error) => {
              console.error("Error deleting member:", error);
              alert("Error: " + error.message);
            });
        }
      }

      // Save member
      async function saveMember() {
        const memberCode = document.getElementById("memberCode").value.trim();
        const fullName = document.getElementById("memberName").value.trim();
        const email = document.getElementById("memberEmail").value.trim();
        const phone = document.getElementById("memberPhone").value.trim();
        const memberType = document.getElementById("memberType").value.trim();
        const maxBooks = document.getElementById("memberMaxBooks").value.trim();

        if (!memberCode || !fullName || !memberType) {
          alert("Member Code, Full Name, and Member Type are required!");
          return;
        }

        try {
          const response = await fetch("/api/members", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              memberCode,
              fullName,
              email: email || null,
              phone: phone || null,
              memberType,
              maxBooks: maxBooks ? parseInt(maxBooks) : 3,
            }),
          });

          if (response.ok) {
            alert("Member added successfully!");
            document.getElementById("addMemberForm").reset();
            const modal = document.getElementById("addMemberModal");
            const bootstrapModal = window.bootstrap.Modal.getInstance(modal);
            bootstrapModal.hide();
            loadMembers();
          } else {
            const error = await response.json();
            alert("Error: " + (error.error || "Failed to add member"));
          }
        } catch (error) {
          console.error("Error adding member:", error);
          alert("Error adding member: " + error.message);
        }
      }

      // Add member button
      document.getElementById("addMemberBtn").addEventListener("click", () => {
        document.getElementById("addMemberForm").reset();
        const modal = new bootstrap.Modal(
          document.getElementById("addMemberModal"),
        );
        modal.show();
      });

      // Logout
      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          try {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login";
          } catch (error) {
            console.error("Logout error:", error);
          }
        });

      // Load user and members on page load
      window.addEventListener("load", () => {
        loadCurrentUser();
        loadMembers();
      });
    </script>
  </body>
</html>
