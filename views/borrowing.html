<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borrowing - Library Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">📚 Library System</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/books">Books</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/members">Members</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/borrowing">Borrowing</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/reports">Reports</a>
            </li>
            <li class="nav-item">
              <span
                class="navbar-text"
                id="userName"
                style="color: white; margin-right: 20px"
              ></span>
            </li>
            <li class="nav-item">
              <button class="btn btn-light btn-sm" id="logoutBtn">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row mb-4">
        <div class="col">
          <h2>🏷️ Borrowing Management</h2>
        </div>
        <div class="col text-end">
          <button class="btn btn-add" id="addBorrowBtn">+ New Borrow</button>
        </div>
      </div>

      <div class="table-container">
        <table class="table table-striped mb-0" id="borrowingTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Member</th>
              <th>Book</th>
              <th>Borrow Date</th>
              <th>Due Date</th>
              <th>Return Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="borrowingTableBody">
            <tr>
              <td colspan="8" class="text-center text-muted">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Add Borrow Modal -->
    <div
      class="modal fade"
      id="addBorrowModal"
      tabindex="-1"
      aria-labelledby="addBorrowModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addBorrowModalLabel">
              New Borrowing Record
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="addBorrowForm">
              <div class="mb-3">
                <label for="borrowMemberId" class="form-label">Member *</label>
                <select class="form-select" id="borrowMemberId" required>
                  <option value="">Select Member</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="borrowBookId" class="form-label">Book *</label>
                <select class="form-select" id="borrowBookId" required>
                  <option value="">Select Book</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="borrowDate" class="form-label">Borrow Date *</label>
                <input
                  type="date"
                  class="form-control"
                  id="borrowDate"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="dueDate" class="form-label">Due Date *</label>
                <input type="date" class="form-control" id="dueDate" required />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="saveBorrow()"
            >
              Save Borrow
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Get current user
      async function loadCurrentUser() {
        try {
          const response = await fetch("/api/auth/me");
          if (response.ok) {
            const user = await response.json();
            document.getElementById("userName").textContent = user.full_name;
          } else {
            window.location.href = "/login";
          }
        } catch (error) {
          window.location.href = "/login";
        }
      }

      // Load members for dropdown
      async function loadMembers() {
        try {
          const response = await fetch("/api/members");
          if (response.ok) {
            const members = await response.json();
            const select = document.getElementById("borrowMemberId");
            members.forEach((member) => {
              const option = document.createElement("option");
              option.value = member.member_id;
              option.textContent = `${member.full_name} (${member.member_code})`;
              select.appendChild(option);
            });
          }
        } catch (error) {
          console.error("Error loading members:", error);
        }
      }

      // Load books for dropdown
      async function loadBooks() {
        try {
          const response = await fetch("/api/books");
          if (response.ok) {
            const books = await response.json();
            const select = document.getElementById("borrowBookId");
            books.forEach((book) => {
              const option = document.createElement("option");
              option.value = book.id;
              option.textContent = `${book.title} (${book.author}) - Available: ${book.available_copies}`;
              select.appendChild(option);
            });
          }
        } catch (error) {
          console.error("Error loading books:", error);
        }
      }

      // Load borrowing records
      async function loadBorrowing() {
        try {
          const response = await fetch("/api/borrowing");
          if (response.ok) {
            const records = await response.json();
            const tbody = document.getElementById("borrowingTableBody");
            tbody.innerHTML = "";

            if (records.length === 0) {
              tbody.innerHTML =
                '<tr><td colspan="8" class="text-center text-muted">No borrowing records found</td></tr>';
              return;
            }

            records.forEach((record) => {
              const row = document.createElement("tr");
              const returnDate = record.return_date
                ? new Date(record.return_date).toLocaleDateString()
                : "-";
              const status = record.return_date ? "Returned" : "Borrowed";
              row.innerHTML = `
                <td>${record.id}</td>
                <td>${record.member_name}</td>
                <td>${record.book_title}</td>
                <td>${new Date(record.borrow_date).toLocaleDateString()}</td>
                <td>${new Date(record.due_date).toLocaleDateString()}</td>
                <td>${returnDate}</td>
                <td>${status}</td>
                <td>
                  ${
                    !record.return_date
                      ? `<button class="btn btn-sm btn-success" onclick="returnBook(${record.id})">Return</button>`
                      : ""
                  }
                  <button class="btn btn-sm btn-primary" onclick="viewDetails(${record.id})">Details</button>
                </td>
              `;
              tbody.appendChild(row);
            });
          }
        } catch (error) {
          console.error("Error loading borrowing records:", error);
        }
      }

      // Save new borrow
      async function saveBorrow() {
        const memberId = document.getElementById("borrowMemberId").value.trim();
        const bookId = document.getElementById("borrowBookId").value.trim();
        const borrowDate = document.getElementById("borrowDate").value.trim();
        const dueDate = document.getElementById("dueDate").value.trim();

        if (!memberId || !bookId || !borrowDate || !dueDate) {
          alert("All fields are required!");
          return;
        }

        // Validate dates
        const borrow = new Date(borrowDate);
        const due = new Date(dueDate);
        if (due <= borrow) {
          alert("Due date must be after borrow date!");
          return;
        }

        // Debug log
        console.log("Saving borrow:", {
          memberId: parseInt(memberId),
          bookId: parseInt(bookId),
          borrowDate,
          dueDate,
        });

        try {
          const response = await fetch("/api/borrowing", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              memberId: parseInt(memberId),
              bookId: parseInt(bookId),
              borrowDate,
              dueDate,
            }),
          });

          if (response.ok) {
            alert("Borrowing record created successfully!");
            document.getElementById("addBorrowForm").reset();
            const modal = document.getElementById("addBorrowModal");
            const bootstrapModal = window.bootstrap.Modal.getInstance(modal);
            bootstrapModal.hide();
            loadBorrowing();
          } else {
            const error = await response.json();
            console.log("API Error:", error);
            alert(
              "Error: " + (error.error || "Failed to create borrowing record"),
            );
          }
        } catch (error) {
          console.error("Error creating borrowing record:", error);
          alert("Error: " + error.message);
        }
      }

      // Return book
      function returnBook(id) {
        if (confirm("Mark this book as returned?")) {
          const returnDate = new Date().toISOString().split("T")[0];
          fetch(`/api/borrowing/${id}/return`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ returnDate }),
          })
            .then((response) => {
              if (response.ok) {
                alert("Book returned successfully!");
                loadBorrowing();
              } else {
                return response.json().then((err) => {
                  throw new Error(err.error || "Failed to return book");
                });
              }
            })
            .catch((error) => {
              console.error("Error returning book:", error);
              alert("Error: " + error.message);
            });
        }
      }

      // View details
      function viewDetails(id) {
        fetch(`/api/borrowing/${id}`)
          .then((response) => {
            if (response.ok) {
              return response.json();
            } else {
              throw new Error("Record not found");
            }
          })
          .then((record) => {
            const details = `
Member: ${record.member_name}
Book: ${record.book_title}
Borrow Date: ${new Date(record.borrow_date).toLocaleDateString()}
Due Date: ${new Date(record.due_date).toLocaleDateString()}
Return Date: ${record.return_date ? new Date(record.return_date).toLocaleDateString() : "Not returned yet"}
Status: ${record.return_date ? "Returned" : "Borrowed"}
            `;
            alert(details);
          })
          .catch((error) => {
            console.error("Error loading details:", error);
            alert("Error: " + error.message);
          });
      }

      // Add borrow button
      document.getElementById("addBorrowBtn").addEventListener("click", () => {
        document.getElementById("addBorrowForm").reset();
        // Set today as default borrow date
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("borrowDate").value = today;
        // Set 14 days later as default due date
        const dueDate = new Date();
        dueDate.setDate(dueDate.getDate() + 14);
        document.getElementById("dueDate").value = dueDate
          .toISOString()
          .split("T")[0];

        const modal = new bootstrap.Modal(
          document.getElementById("addBorrowModal"),
        );
        modal.show();
      });

      // Logout
      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          try {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login";
          } catch (error) {
            console.error("Logout error:", error);
          }
        });

      // Load user and borrowing records on page load
      window.addEventListener("load", () => {
        loadCurrentUser();
        loadMembers();
        loadBooks();
        loadBorrowing();
      });
    </script>
  </body>
</html>
