<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Library Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">📚 Library System</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <span
                class="navbar-text"
                id="userName"
                style="color: white; margin-right: 20px"
              ></span>
            </li>
            <li class="nav-item">
              <button class="btn btn-light btn-sm" id="logoutBtn">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-main">
      <div class="container">
        <!-- Summary Stats -->
        <div class="row mb-5" id="statsContainer">
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-number" id="totalBooks">-</div>
              <div class="stat-label">Total Books</div>
            </div>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-number" id="availableBooks">-</div>
              <div class="stat-label">Available Books</div>
            </div>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-number" id="activeMembers">-</div>
              <div class="stat-label">Active Members</div>
            </div>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-number" id="borrowedBooks">-</div>
              <div class="stat-label">Borrowed Books</div>
            </div>
          </div>
        </div>

        <!-- Additional Stats (Optional) -->
        <div
          class="row mb-5"
          id="additionalStatsContainer"
          style="display: none"
        >
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-number" id="overdueBooks" style="color: #dc3545">
                -
              </div>
              <div class="stat-label">Overdue Books</div>
            </div>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="stat-card">
              <div
                class="stat-number"
                id="unreturnedBooks"
                style="color: #fd7e14"
              >
                -
              </div>
              <div class="stat-label">Unreturned</div>
            </div>
          </div>
        </div>

        <!-- Menu -->
        <div class="row">
          <div class="col-12 col-sm-6 col-lg-3">
            <a href="/books" class="menu-button">
              <div class="menu-icon">📖</div>
              <div>Books</div>
            </a>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <a href="/members" class="menu-button">
              <div class="menu-icon">👥</div>
              <div>Members</div>
            </a>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <a href="/borrowing" class="menu-button">
              <div class="menu-icon">🏷️</div>
              <div>Borrowing</div>
            </a>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <a href="/reports" class="menu-button">
              <div class="menu-icon">📊</div>
              <div>Reports</div>
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Get current user
      async function loadCurrentUser() {
        try {
          const response = await fetch("/api/auth/me");
          if (response.ok) {
            const user = await response.json();
            document.getElementById("userName").textContent = user.full_name;
          } else {
            window.location.href = "/login";
          }
        } catch (error) {
          window.location.href = "/login";
        }
      }

      // Load statistics
      async function loadStats() {
        try {
          const response = await fetch("/api/dashboard/stats");
          if (response.ok) {
            const stats = await response.json();
            document.getElementById("totalBooks").textContent =
              stats.totalBooks || 0;
            document.getElementById("availableBooks").textContent =
              stats.availableBooks || 0;
            document.getElementById("activeMembers").textContent =
              stats.activeMembers || 0;
            document.getElementById("borrowedBooks").textContent =
              stats.borrowedBooks || 0;

            // Load optional stats if available
            if (
              stats.overdueBooks !== undefined ||
              stats.unreturned !== undefined
            ) {
              document.getElementById("overdueBooks").textContent =
                stats.overdueBooks || 0;
              document.getElementById("unreturnedBooks").textContent =
                stats.unreturned || 0;
              document.getElementById(
                "additionalStatsContainer",
              ).style.display = "none";
            }
          }
        } catch (error) {
          console.error("Error loading stats:", error);
        }
      }

      // Logout
      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          try {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login";
          } catch (error) {
            console.error("Logout error:", error);
          }
        });

      // Load user and stats on page load
      window.addEventListener("load", () => {
        loadCurrentUser();
        loadStats();
      });
    </script>
  </body>
</html>
